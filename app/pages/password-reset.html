<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reset</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; }
      form { max-width: 320px; display: grid; gap: 0.75rem; }
      input, button { padding: 0.6rem; }
      .message { margin-top: 1rem; color: #0b6e4f; }
      .error { color: #b00020; }
    </style>
  </head>
  <body>
    <h1>Password Reset</h1>
    <form>
      <input id="email" placeholder="Email" />
      <button type="submit">Send reset link</button>
    </form>
    <p id="feedback" class="message">Enter your email to receive a reset link.</p>
    <script>
      const form = document.querySelector('form');
      const feedback = document.getElementById('feedback');
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        if (!email.includes('@')) {
          feedback.className = 'error';
          feedback.textContent = 'Please enter a valid email address.';
        } else {
          feedback.className = 'message';
          feedback.textContent = 'Reset link sent successfully.';
        }
      });
    </script>
  </body>
</html>
