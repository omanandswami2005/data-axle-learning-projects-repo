<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; }
      form { max-width: 360px; display: grid; gap: 0.75rem; }
      input, button { padding: 0.6rem; }
      .message { margin-top: 1rem; color: #0b6e4f; }
      .error { color: #b00020; }
    </style>
  </head>
  <body>
    <h1>Profile</h1>
    <form>
      <input id="name" placeholder="Display name" />
      <input id="phone" placeholder="Phone number" />
      <button type="submit">Save profile</button>
    </form>
    <p id="feedback" class="message">Update your profile details.</p>
    <script>
      const form = document.querySelector('form');
      const feedback = document.getElementById('feedback');
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        if (!name || !phone) {
          feedback.className = 'error';
          feedback.textContent = 'Name and phone are required.';
        } else {
          feedback.className = 'message';
          feedback.textContent = 'Profile updated successfully.';
        }
      });
    </script>
  </body>
</html>
